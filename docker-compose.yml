x-common-env: &common-env
  ENVIRONMENT: "${ENVIRONMENT:-development}"

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: zenova_user
      POSTGRES_PASSWORD: "${DB_PASSWORD:-zenova_pass}"
      POSTGRES_DB: zenova_db
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zenova_user -d zenova_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: "${DB_MEM_LIMIT:-512M}"
          cpus: "${DB_CPU_LIMIT:-1.0}"

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: "${REDIS_MEM_LIMIT:-256M}"
          cpus: "${REDIS_CPU_LIMIT:-0.5}"

  backend:
    build: ./backend
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    environment:
      <<: *common-env
      DATABASE_URL: "postgresql://zenova_user:${DB_PASSWORD:-zenova_pass}@db:5432/zenova_db"
      REDIS_URL: "redis://redis:6379/0"
      SECRET_KEY: "${SECRET_KEY:?Set SECRET_KEY in .env or environment}"
      MASTER_SETUP_KEY: "${MASTER_SETUP_KEY:-}"
      ALLOWED_ORIGINS: "http://localhost:3000,http://127.0.0.1:3000,http://frontend:3000"
      TRUSTED_NETWORKS: "${TRUSTED_NETWORKS:-}"
    volumes:
      - backend_data:/app/backend/data
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: "${BACKEND_MEM_LIMIT:-1024M}"
          cpus: "${BACKEND_CPU_LIMIT:-2.0}"

  frontend:
    build: ./frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    environment:
      <<: *common-env
      NEXT_PUBLIC_API_URL: "${FRONTEND_PUBLIC_API_URL:-http://localhost:8000/api/v1}"
      NEXT_PUBLIC_WS_URL: "${FRONTEND_PUBLIC_WS_URL:-ws://localhost:8000/ws}"
    depends_on:
      - backend
    deploy:
      resources:
        limits:
          memory: "${FRONTEND_MEM_LIMIT:-512M}"
          cpus: "${FRONTEND_CPU_LIMIT:-1.0}"

volumes:
  pgdata:
  backend_data:
