services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ${DB_USER:-zenova}
      POSTGRES_PASSWORD: ${DB_PASS:-zenova_secret}
      POSTGRES_DB: ${DB_NAME:-zenova}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - zenova_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-zenova}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks:
      - zenova_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      args:
        SCHOOL_WATERMARK: ${SCHOOL_WATERMARK:-dev}
        BUILD_ID: ${BUILD_ID:-0}
    environment:
      DATABASE_URL: postgresql://${DB_USER:-zenova}:${DB_PASS:-zenova_secret}@postgres:5432/${DB_NAME:-zenova}
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY}
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: "30"
      ENVIRONMENT: production
      SCHOOL_WATERMARK: ${SCHOOL_WATERMARK:-dev}
      BUILD_ID: ${BUILD_ID:-0}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - zenova_net

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: http://${SERVER_IP:-localhost}:8000/api/v1
    environment:
      NODE_ENV: production
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - zenova_net

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
    restart: unless-stopped
    networks:
      - zenova_net

networks:
  zenova_net:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
