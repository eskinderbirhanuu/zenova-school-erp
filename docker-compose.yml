x-common-env: &common-env
  ENVIRONMENT: "${ENVIRONMENT:-development}"

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: zenova_user
      POSTGRES_PASSWORD: "${DB_PASSWORD:-zenova_pass}"
      POSTGRES_DB: zenova_db
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zenova_user -d zenova_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    environment:
      <<: *common-env
      DATABASE_URL: "postgresql://zenova_user:${DB_PASSWORD:-zenova_pass}@db:5432/zenova_db"
      REDIS_URL: "redis://redis:6379/0"
      SECRET_KEY: "${SECRET_KEY:?Set SECRET_KEY in .env or environment}"
      MASTER_SETUP_KEY: "${MASTER_SETUP_KEY:-}"
      ALLOWED_ORIGINS: "http://localhost:3000,http://127.0.0.1:3000,http://frontend:3000"
      TRUSTED_NETWORKS: "${TRUSTED_NETWORKS:-}"
    volumes:
      - backend_data:/app/backend/data
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    environment:
      <<: *common-env
      NEXT_PUBLIC_API_URL: "${FRONTEND_PUBLIC_API_URL:-http://localhost:8000/api/v1}"
      NEXT_PUBLIC_WS_URL: "${FRONTEND_PUBLIC_WS_URL:-ws://localhost:8000/ws}"
    depends_on:
      - backend

volumes:
  pgdata:
  backend_data:
