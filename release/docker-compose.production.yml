# Security note: NEVER ship this file with source code.
# This is the CUSTOMER deployment template.
# Distribute ONLY docker-compose.yml + .env template + docker images.
# No source files should reach the customer.

x-common-env: &common-env
  ENVIRONMENT: "${ENVIRONMENT:-production}"

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: zenova_user
      POSTGRES_PASSWORD: "${DB_PASSWORD:?Set DB_PASSWORD in .env}"
      POSTGRES_DB: zenova_db
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zenova_user -d zenova_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: "${DB_MEM_LIMIT:-512M}"
          cpus: "${DB_CPU_LIMIT:-1.0}"

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: "${REDIS_MEM_LIMIT:-256M}"
          cpus: "${REDIS_CPU_LIMIT:-0.5}"

  backend:
    # Customer receives pre-built image — no build context
    image: zenova/backend:${ZENOVA_VERSION:-latest}
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    environment:
      <<: *common-env
      DATABASE_URL: "postgresql://zenova_user:${DB_PASSWORD:?}@db:5432/zenova_db"
      REDIS_URL: "redis://redis:6379/0"
      SECRET_KEY: "${SECRET_KEY:?Set SECRET_KEY in .env or environment}"
      ZENOVA_LICENSE_KEY: "${ZENOVA_LICENSE_KEY:?Set ZENOVA_LICENSE_KEY in .env}"
      ZENOVA_LICENSE_SERVER: "${ZENOVA_LICENSE_SERVER:-https://superadmin.free.nf}"
      SCHOOL_ID: "${SCHOOL_ID:?Set SCHOOL_ID in .env}"
      ALLOWED_ORIGINS: "http://localhost:3000,http://127.0.0.1:3000"
    volumes:
      - backend_data:/app/backend/data
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  frontend:
    image: zenova/frontend:${ZENOVA_VERSION:-latest}
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    environment:
      <<: *common-env
      NEXT_PUBLIC_API_URL: "${FRONTEND_PUBLIC_API_URL:-http://localhost:8000/api/v1}"
      NEXT_PUBLIC_WS_URL: "${FRONTEND_PUBLIC_WS_URL:-ws://localhost:8000/ws}"
    depends_on:
      - backend

volumes:
  pgdata:
  backend_data:
