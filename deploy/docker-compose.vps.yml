services:
  nginx:
    image: nginx:1.26-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
      - certbot-data:/var/www/certbot
    depends_on:
      - backend
      - frontend
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${DB_USER:-zenova}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD required}
      POSTGRES_DB: ${DB_NAME:-zenova_prod}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backups:/backups
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-zenova} -d ${DB_NAME:-zenova_prod}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    expose:
      - "8000"
    environment:
      DATABASE_URL: "postgresql://${DB_USER:-zenova}:${DB_PASSWORD}@db:5432/${DB_NAME:-zenova_prod}"
      REDIS_URL: "redis://redis:6379/0"
      ENVIRONMENT: "production"
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY required}
      ALLOWED_ORIGINS: ${DOMAIN_URL}
      CORS_ORIGINS: ${DOMAIN_URL}
      SERVER_ID_FILE: /data/server_id.json
      MASTER_SETUP_KEY: ${MASTER_SETUP_KEY:-}
    volumes:
      - server-data:/data
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    expose:
      - "3000"
    environment:
      NEXT_PUBLIC_API_URL: "${DOMAIN_URL}/api/v1"
      NEXT_PUBLIC_WS_URL: "wss://${DOMAIN}/ws"
    depends_on:
      - backend
    restart: unless-stopped

  sync-worker:
    build:
      context: ../backend
      dockerfile: Dockerfile
    entrypoint: ["python", "-m", "app.workers.sync_worker", "30"]
    environment:
      DATABASE_URL: "postgresql://${DB_USER:-zenova}:${DB_PASSWORD}@db:5432/${DB_NAME:-zenova_prod}"
      REDIS_URL: "redis://redis:6379/0"
      ENVIRONMENT: "production"
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY required}
    depends_on:
      - db
      - redis
    restart: unless-stopped

  # license-server:
  #   build:
  #     context: ../license-server
  #     dockerfile: Dockerfile
  #   expose:
  #     - "8001"
  #   environment:
  #     DATABASE_URL: "postgresql://${LICENSE_DB_USER:-zenova_license}:${LICENSE_DB_PASSWORD}@license-db:5432/${LICENSE_DB_NAME:-zenova_license}"
  #     SECRET_KEY: ${LICENSE_SECRET_KEY}
  #   depends_on:
  #     license-db:
  #       condition: service_healthy
  #   restart: unless-stopped

  certbot:
    image: certbot/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while true; do certbot renew; sleep 43200; done'"
    volumes:
      - certbot-conf:/etc/letsencrypt
      - certbot-data:/var/www/certbot
    profiles: ["ssl"]
    restart: unless-stopped

  backup-worker:
    image: postgres:16-alpine
    entrypoint: |
      sh -c 'while true; do \
        pg_dump "postgresql://${DB_USER:-zenova}:${DB_PASSWORD}@db:5432/${DB_NAME:-zenova_prod}" \
        --no-owner --no-acl -f /backups/zenova_$$(date +%%Y%%m%%d_%%H%%M%%S).sql && \
        find /backups -name "*.sql" -mtime +7 -delete; \
        sleep 86400; \
      done'
    depends_on:
      - db
    volumes:
      - ./backups:/backups
    environment:
      DB_USER: ${DB_USER:-zenova}
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD required}
      DB_NAME: ${DB_NAME:-zenova_prod}
    restart: unless-stopped

volumes:
  pgdata:
  redis-data:
  server-data:
  certbot-data:
  certbot-conf:
