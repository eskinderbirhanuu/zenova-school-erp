version: "3.9"

# ─── Development-only compose file ──────────────────────
# Do NOT use this file in production.
# For production, use: deploy/docker-compose.vps.yml

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: zenova_user
      POSTGRES_PASSWORD: ${DB_PASSWORD:-zenova_pass}
      POSTGRES_DB: zenova_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${DB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zenova_user -d zenova_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    environment:
      DATABASE_URL: postgresql://zenova_user:${DB_PASSWORD:-zenova_pass}@db:5432/zenova_db
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY:-dev-secret-key}
      ENVIRONMENT: development
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app

volumes:
  postgres_data:
