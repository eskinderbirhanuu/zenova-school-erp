version: "3.9"

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: zenova_user
      POSTGRES_PASSWORD: zenova_pass
      POSTGRES_DB: zenova_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://zenova_user:zenova_pass@db:5432/zenova_db
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY:-dev-secret-key}
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
      ENVIRONMENT: development
    depends_on:
      - db
      - redis
    volumes:
      - .:/app

volumes:
  postgres_data:
