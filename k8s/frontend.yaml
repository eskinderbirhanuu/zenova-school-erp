apiVersion: v1
kind: Service
metadata:
  name: zenova-frontend
  namespace: zenova
spec:
  selector:
    app: zenova-frontend
  ports:
    - port: 3000
      targetPort: 3000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: zenova-frontend
  namespace: zenova
spec:
  replicas: 2
  selector:
    matchLabels:
      app: zenova-frontend
  template:
    metadata:
      labels:
        app: zenova-frontend
    spec:
      containers:
        - name: frontend
          image: zenova/frontend:latest
          ports:
            - containerPort: 3000
          env:
            - name: NEXT_PUBLIC_API_URL
              value: "https://api.zenova.example.com/api/v1"
            - name: NEXT_PUBLIC_WS_URL
              value: "wss://api.zenova.example.com/ws"
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
