# WARNING: Do NOT commit real secrets to this file.
# In production, create the secret imperatively:
#
#   kubectl create secret generic zenova-secrets --namespace zenova \
#     --from-literal=SECRET_KEY="$(python -c 'import secrets; print(secrets.token_urlsafe(48))')" \
#     --from-literal=DATABASE_URL="postgresql://zenova_user:<password>@zenova-db:5432/zenova_db" \
#     --from-literal=DB_PASSWORD="<postgres-password>" \
#     --from-literal=REDIS_URL="redis://:<password>@zenova-redis:6379/0" \
#     --from-literal=REDIS_PASSWORD="<redis-password>" \
#     --from-literal=MASTER_SETUP_KEY="$(python -c 'import secrets; print(secrets.token_urlsafe(32))')" \
#     --from-literal=SYNC_SECRET="$(python -c 'import secrets; print(secrets.token_urlsafe(32))')" \
#     --from-literal=SMTP_HOST="<smtp-host>" \
#     --from-literal=SMTP_USERNAME="<smtp-username>" \
#     --from-literal=SMTP_PASSWORD="<smtp-password>" \
#     --from-literal=EMAIL_FROM_NAME="ZENOVA School" \
#     --from-literal=EMAIL_FROM_ADDRESS="noreply@zenova.com"
#
# For sealed-secrets (recommended): `kubeseal < zenova-secrets.yaml > sealed-secret.yaml`
# For ExternalSecret: configure cluster SecretStore then reference it here.
---
apiVersion: v1
kind: Secret
metadata:
  name: zenova-secrets
  namespace: zenova
type: Opaque
# stringData intentionally omitted — use kubectl create secret generic
