apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: zenova-ingress
  namespace: zenova
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - zenova.example.com
        - api.zenova.example.com
      secretName: zenova-tls
  rules:
    - host: zenova.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: zenova-frontend
                port:
                  number: 3000
    - host: api.zenova.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: zenova-backend
                port:
                  number: 8000
