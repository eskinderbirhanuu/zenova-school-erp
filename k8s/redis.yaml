apiVersion: v1
kind: Service
metadata:
  name: zenova-redis
  namespace: zenova
spec:
  selector:
    app: zenova-redis
  ports:
    - port: 6379
      targetPort: 6379
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: zenova-redis
  namespace: zenova
spec:
  replicas: 1
  selector:
    matchLabels:
      app: zenova-redis
  template:
    metadata:
      labels:
        app: zenova-redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
          env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: zenova-secrets
                  key: REDIS_PASSWORD
          command:
            - /bin/sh
            - -c
            - exec redis-server --requirepass "$REDIS_PASSWORD" --appendonly yes
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - redis-cli -a "$REDIS_PASSWORD" ping
            initialDelaySeconds: 5
            periodSeconds: 5
